name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11.10.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create CI environment
        run: cp .env.example .env

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm biome:lint

      - name: Audit
        run: pnpm audit --audit-level moderate
